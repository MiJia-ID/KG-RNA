# KG-RNA Agent 配置文件

# 数据路径
data:
  csv_path: "/home/mijia/KG-RNA/KG-data/protein_rna_with_fasta_clean.csv"

# 实验方法基础权重
method_weights:
  CLIP: 0.92
  RIP: 0.82
  COIP: 0.75
  EMSA: 0.72
  REPORTER: 0.65
  IP: 0.6
  COMPUTATIONAL: 0.4
  COPRECIP: 0.7

# 评分参数
scoring:
  alpha: 0.55  # 证据可信度权重
  count_bonus_max: 0.1
  count_bonus_rate: 0.02

# LLM 配置
llm:
  model: "gpt-4"
  max_tokens: 512
  temperature: 0.0
  timeout: 30

# 检索配置
retriever:
  timeout: 15
  max_retries: 3

# 日志配置
logging:
  level: "INFO"