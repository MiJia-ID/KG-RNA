name: KG
channels:
  - conda-forge
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge/
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main/
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/r/
dependencies:
  - python=3.9
  # 科学计算核心包（优先用 conda 安装）
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scikit-learn>=1.0.0
  
  # 生物信息学包
  - biopython>=1.79
  
  # Web 框架
  - flask>=2.0.0
  
  # 工具库
  - requests>=2.26.0
  - tqdm>=4.62.0
  - pyyaml>=6.0
  
  # 测试框架
  - pytest>=6.2.0
  - pytest-cov  # 可选：测试覆盖率
  
  # pip 本身
  - pip
  
  # 通过 pip 安装的包（conda 中没有或版本不匹配）
  - pip:
    - openai>=0.27.0
    - jsonschema>=4.0.0